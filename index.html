<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Primary Meta Tags -->
  <title>Swadeep Bansode — Hardware Engineer · Robotics · SYGNIX</title>
  <meta name="title" content="Swadeep Bansode — Hardware Engineer · Robotics · SYGNIX">
  <meta name="description"
    content="A futuristic AI engineering ecosystem by Swadeep Bansode. IoT hardware systems, robotics, custom software, and the AURORA holographic AI companion.">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://swadeepbansode.com/">
  <meta property="og:title" content="Swadeep Bansode — AURORA · SYGNIX">
  <meta property="og:description"
    content="A futuristic AI engineering ecosystem by Swadeep Bansode. IoT hardware systems, robotics, custom software, and the AURORA holographic AI companion.">
  <meta property="og:image" content="https://swadeepbansode.com/logo.png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://swadeepbansode.com/">
  <meta property="twitter:title" content="Swadeep Bansode — AURORA · SYGNIX">
  <meta property="twitter:description"
    content="A futuristic AI engineering ecosystem by Swadeep Bansode. IoT hardware systems, robotics, custom software, and the AURORA holographic AI companion.">
  <meta property="twitter:image" content="https://swadeepbansode.com/logo.png">

  <!-- Favicon / Logo -->
  <link rel="icon" type="image/png" href="/logo.png">

  <style>
    :root {
      --bg: #030712;
      --text: #f3f4f6;
      --accent: #22d3ee;
      --accent-purple: #a855f7;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .container {
      max-width: 600px;
      width: 100%;
      padding: 40px 20px;
      text-align: center;
    }

    .logo-container {
      position: relative;
      width: 96px;
      height: 96px;
      margin: 0 auto 24px;
    }

    .logo-img {
      width: 100%;
      height: 100%;
      object-contain: contain;
      filter: drop-shadow(0 0 15px rgba(34, 211, 238, 0.5));
    }

    h1 {
      font-size: 2.2rem;
      margin: 10px 0 5px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .title-sub {
      font-size: 0.8rem;
      letter-spacing: 0.3em;
      color: #9ca3af;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    p {
      color: #9ca3af;
      line-height: 1.6;
      font-size: 0.95rem;
      margin-bottom: 32px;
    }

    .links-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 40px;
    }

    .link-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 14px;
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: all 0.3s ease;
    }

    .link-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(34, 211, 238, 0.2);
      transform: translateY(-2px);
    }

    .socials {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 20px;
    }

    .social-link {
      color: #9ca3af;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      border: 1px solid var(--card-border);
      padding: 8px 16px;
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    .social-link:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .footer-note {
      font-size: 0.75rem;
      color: #4b5563;
      margin-top: 48px;
      letter-spacing: 0.1em;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
